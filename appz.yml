app:
  name: wordpress
  code: wordpress
  notify: appzdev@cloudbourne.co

build:
  version: 5.5
  env: DEV
  build_file: none
  output_files: output/*.zip
  image_template: wordpress-5.5

deploy:
  context: arjun-cc/DEV
  replicas: 1
  type: statefulset
  port:
  - 80
  
volumes:
- claim: wordpress-data
  mount: /var/www/html/wp-content/uploads
  name: uploads
  size: 5Gi   
- claim: wordpress-backup
  mount: /appz/backup
  name: backup
  size: 5Gi 
  
properties:
  ENABLE_HA: "no"
  MYSQL_HOST: "mysql-5-7:3306"
  MYSQL_USER: wordpress
  MYSQL_DATABASE: wordpress

  MYSQL_PASSWORD:
    vault: MYSQL_WORDPRESS_PASSWORD

  MYSQL_WORDPRESS_PASSWORD:
    vault: MYSQL_WORDPRESS_PASSWORD

  MYSQL_ROOT_PASSWORD:
    vault: MYSQL_ROOT_PASSWORD_KEY
  revision : 82
